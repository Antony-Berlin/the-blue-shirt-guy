version: "3.9"

services:
  gen-env:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "7860:7860"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - BENCHMARK_PATH=/app/tasks/benchmark.json
      - MAX_STEPS_PER_EPISODE=10
    volumes:
      # Mount tasks at runtime for easy updates without rebuilding
      - ./tasks:/app/tasks:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7860/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
